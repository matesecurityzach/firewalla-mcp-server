name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    # Gate the build on no HIGH/CRITICAL advisories. Moderate and lower
    # are reported (via `audit` step's normal output) but don't fail CI —
    # the runtime surface is the priority and most moderates land in dev
    # tooling.
    - name: Audit dependencies (high+)
      run: npm audit --audit-level=high

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Core Tests
      run: npm run test:quick
      env:
        CI: true
        NODE_ENV: test

